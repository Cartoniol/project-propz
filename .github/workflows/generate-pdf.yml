name: Generate PDF

on:
  push:
    branches:
      - main
    paths:
      - PROJECT_OVERVIEW.md

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pandoc + LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Convert Mermaid diagrams to PNG
        run: |
          cat > puppeteer-config.json << 'JSON'
          {"args": ["--no-sandbox", "--disable-setuid-sandbox"]}
          JSON

          python3 << 'PYEOF'
          import re, os, subprocess, sys

          with open('PROJECT_OVERVIEW.md', 'r', encoding='utf-8') as f:
              content = f.read()

          pattern = r'```mermaid\n(.*?)\n```'
          matches = list(re.finditer(pattern, content, re.DOTALL))

          if not matches:
              print("No Mermaid diagrams found — skipping conversion.")
              with open('PROJECT_OVERVIEW_processed.md', 'w', encoding='utf-8') as f:
                  f.write(content)
              sys.exit(0)

          for i, match in enumerate(matches):
              mmd_file = f'diagram_{i}.mmd'
              png_file = f'diagram_{i}.png'

              with open(mmd_file, 'w', encoding='utf-8') as f:
                  f.write(match.group(1))

              result = subprocess.run(
                  ['mmdc', '-i', mmd_file, '-o', png_file,
                   '--puppeteerConfigFile', 'puppeteer-config.json'],
                  capture_output=True, text=True
              )

              if result.returncode != 0:
                  print(f"Error converting diagram {i+1}:\n{result.stderr}", file=sys.stderr)
                  sys.exit(1)

              print(f"Converted diagram {i+1} → {png_file}")
              content = content.replace(match.group(0), f'![Diagram {i+1}]({png_file})', 1)

          with open('PROJECT_OVERVIEW_processed.md', 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"Done — {len(matches)} diagram(s) converted.")
          PYEOF

      - name: Generate PDF
        run: |
          pandoc PROJECT_OVERVIEW_processed.md \
            --pdf-engine=xelatex \
            --toc \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V mainfont="DejaVu Sans" \
            -o PROJECT_OVERVIEW.pdf

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PROJECT_OVERVIEW.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate PROJECT_OVERVIEW.pdf [skip ci]"
          git push
