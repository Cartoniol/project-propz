name: AI Vibe Check

on:
  push:
    branches:
      - main

jobs:
  vibe:
    runs-on: ubuntu-latest
    # Skip commits pushed by the bot itself (defence-in-depth alongside [skip ci])
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2          # need the parent commit for git diff HEAD~1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run Vibe Check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python .github/scripts/vibe_check.py

      - name: Commit & push VIBE_LOG.md
        run: |
          git config user.name "VibeBot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VIBE_LOG.md
          git diff --staged --quiet || git commit -m "chore(vibe): AI vibe check [skip ci]"
          git push
