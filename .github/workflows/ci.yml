name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual bootstrap — forces a full PDF + RAG rebuild

jobs:
  # ─── Detect which pipelines need to run ────────────────────────────────────
  changes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      overview: ${{ steps.check.outputs.overview }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: check
        run: |
          # workflow_dispatch → always rebuild PDF + RAG (bootstrap use-case)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q '^PROJECT_OVERVIEW\.md$'; then
            echo "overview=true" >> "$GITHUB_OUTPUT"
          else
            echo "overview=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Pipeline 1: PDF Generation ────────────────────────────────────────────
  generate-pdf:
    needs: changes
    if: needs.changes.outputs.overview == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pandoc + LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Convert Mermaid diagrams to PNG
        run: |
          cat > puppeteer-config.json << 'JSON'
          {"args": ["--no-sandbox", "--disable-setuid-sandbox"]}
          JSON

          python3 << 'PYEOF'
          import re, os, subprocess, sys

          with open('PROJECT_OVERVIEW.md', 'r', encoding='utf-8') as f:
              content = f.read()

          pattern = r'```mermaid\n(.*?)\n```'
          matches = list(re.finditer(pattern, content, re.DOTALL))

          if not matches:
              print("No Mermaid diagrams found — skipping conversion.")
              with open('PROJECT_OVERVIEW_processed.md', 'w', encoding='utf-8') as f:
                  f.write(content)
              sys.exit(0)

          for i, match in enumerate(matches):
              mmd_file = f'diagram_{i}.mmd'
              png_file  = f'diagram_{i}.png'

              with open(mmd_file, 'w', encoding='utf-8') as f:
                  f.write(match.group(1))

              result = subprocess.run(
                  ['mmdc', '-i', mmd_file, '-o', png_file,
                   '--puppeteerConfigFile', 'puppeteer-config.json'],
                  capture_output=True, text=True
              )

              if result.returncode != 0:
                  print(f"Error converting diagram {i+1}:\n{result.stderr}", file=sys.stderr)
                  sys.exit(1)

              print(f"Converted diagram {i+1} → {png_file}")
              content = content.replace(match.group(0), f'![Diagram {i+1}]({png_file})', 1)

          with open('PROJECT_OVERVIEW_processed.md', 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"Done — {len(matches)} diagram(s) converted.")
          PYEOF

      - name: Generate PDF
        run: |
          pandoc PROJECT_OVERVIEW_processed.md \
            --pdf-engine=xelatex \
            --toc \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V mainfont="DejaVu Sans" \
            -o PROJECT_OVERVIEW.pdf

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PROJECT_OVERVIEW.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate PROJECT_OVERVIEW.pdf [skip ci]"
          git push

  # ─── Pipeline 2: RAG Vector Store ──────────────────────────────────────────
  build-vector-store:
    needs: [changes, generate-pdf]
    if: needs.changes.outputs.overview == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest (picks up the PDF commit from the previous job)
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install sentence-transformers numpy

      - name: Build vector store
        run: python .github/scripts/build_embeddings.py

      - name: Commit vector store
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chat/vector_store.json
          git diff --staged --quiet || git commit -m "chore(rag): rebuild vector store [skip ci]"
          git push

  # ─── Pipeline 3: AI Vibe Check ─────────────────────────────────────────────
  vibe-check:
    needs: [changes, generate-pdf, build-vector-store]
    # always() lets this job run even when generate-pdf / build-vector-store were
    # skipped (i.e. when PROJECT_OVERVIEW.md was NOT the file that changed).
    # Skip on workflow_dispatch — there is no meaningful user commit to review.
    if: >-
      always() &&
      github.actor != 'github-actions[bot]' &&
      github.event_name == 'push' &&
      needs.changes.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2          # need parent commit for git diff SHA~1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest (picks up any bot commits from earlier jobs)
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Vibe Check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pass the original user-commit SHA so vibe_check.py always diffs
          # the correct commit even after git pull advanced HEAD past bot commits.
          ORIGINAL_SHA: ${{ github.sha }}
        run: python .github/scripts/vibe_check.py

      - name: Commit & push VIBE_LOG.md
        run: |
          git config user.name "VibeBot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VIBE_LOG.md
          git diff --staged --quiet || git commit -m "chore(vibe): AI vibe check [skip ci]"
          git push
